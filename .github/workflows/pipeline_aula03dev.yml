name: Pipeline Aula 3

on:
  push:
    branches:
      - dev


jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rodar testes
        run: pytest

      - name: Gerar artefato zip
        run: zip -r pipeline-demo.zip
      
      - name: Publicar artefato
        uses: actions/upload-artifact@v4
        with: 
            name: codigo-buildado
            path: pipeline-demo.zip

  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Simular Deploy
        run: echo "Deploy realizado com sucesso"

  test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Simular testes
        run: echo "Teste simulado com sucesso"
 
      - name: Baixar artefato
        uses: actions/download-artifact@v4
        with: 
          name: codigo-buildado

      - name: Extrair artefato
        run: unzip pipeline-demo.zip